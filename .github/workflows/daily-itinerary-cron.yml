name: Daily Itinerary Email

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: "0 8 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  send-itinerary:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily itinerary cron endpoint
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/daily-itinerary"
